server {
    listen       3000;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Security headers (inner server – nginx reverse proxy adds the full set)
    # -------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;

    # -------------------------------------------------------------------------
    # Cache control for static assets
    # -------------------------------------------------------------------------
    # Hashed bundle files (Vite outputs filename with content hash)
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # HTML files must not be cached so the browser always gets the latest index
    location ~* \.html$ {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # -------------------------------------------------------------------------
    # API proxy – forward /api/* to the backend container
    # (used when the frontend container is accessed directly, bypassing nginx)
    # -------------------------------------------------------------------------
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # SPA fallback – all other routes serve index.html
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Health check
    # -------------------------------------------------------------------------
    location /healthz {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }
}
