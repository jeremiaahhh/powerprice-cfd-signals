# =============================================================================
# Alembic configuration file
# =============================================================================

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used to generate migration file names.
# Default: %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path modification: add directories to python path
# prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory.
sourceless = false

# Version location specification; This defaults to alembic/versions.
version_locations = %(here)s/alembic/versions

# Version path separator; As mentioned above, this is the character used to
# split the version_locations string.
version_path_separator = os  # Use os.pathsep.

# Set the output encoding used when revision files are written from
# "script.py.mako"; defaults to utf-8.
output_encoding = utf-8

# ---------------------------------------------------------------------------
# Database URL
# Alembic reads DATABASE_URL_SYNC from the environment (set in .env or the
# shell).  The value here is a fallback for running alembic CLI commands
# locally without the full environment loaded.
# In production this is overridden by env.py reading os.environ.
# ---------------------------------------------------------------------------
sqlalchemy.url = postgresql://ppuser:pppass@localhost:5432/powerprice


# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
