user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_buffers       16 8k;
    gzip_http_version  1.1;
    gzip_min_length    256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # WebSocket upgrade map
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # Upstream definitions
    # -------------------------------------------------------------------------
    upstream backend_upstream {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Main server block (HTTP – redirects to self or serves directly in dev)
    # -------------------------------------------------------------------------
    server {
        listen       80;
        server_name  _;

        # --- Security headers ------------------------------------------------
        add_header X-Frame-Options           "SAMEORIGIN"             always;
        add_header X-Content-Type-Options    "nosniff"                always;
        add_header X-XSS-Protection          "1; mode=block"          always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data:;"
            always;

        # --- API proxy (strip /api prefix) -----------------------------------
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            proxy_read_timeout    300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout    300s;

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      4 64k;
        }

        # --- WebSocket endpoint (explicit) -----------------------------------
        location /ws/ {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            proxy_read_timeout 3600s;
        }

        # --- Frontend (React SPA) -------------------------------------------
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket pass-through for Vite HMR in development
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
        }

        # --- Health check (used by load balancers / k8s) --------------------
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server block (uncomment and configure when certs are available)
    # -------------------------------------------------------------------------
    # server {
    #     listen              443 ssl http2;
    #     server_name         your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     ssl_session_cache    shared:SSL:10m;
    #     ssl_session_timeout  10m;
    #     ssl_protocols        TLSv1.2 TLSv1.3;
    #     ssl_ciphers          HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Same location blocks as above...
    # }
}
